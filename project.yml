name: SchoolFootballManager
options:
  bundleIdPrefix: com.rinkan
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "iPhone Developer"
    PRODUCT_BUNDLE_IDENTIFIER: com.rinkan.schoolfootballmanager
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: 10.0.0

targets:
  SchoolFootballManager:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
        excludes:
          - "**/*.md"
    resources:
      - path: Resources
        type: folder
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFirestoreSwift
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: SchoolFootballManager
        CFBundleDisplayName: Football Manager
        CFBundleIdentifier: com.rinkan.schoolfootballmanager
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "This app needs access to camera to take player photos."
        NSPhotoLibraryUsageDescription: "This app needs access to photo library to select player photos."
        UIBackgroundModes:
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rinkan.schoolfootballmanager
        SWIFT_VERSION: "5.10"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TARGETED_DEVICE_FAMILY: "1,2"